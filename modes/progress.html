<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Progress</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<main class="container">
  <a href="../index.html" class="back-link">← Back</a>
  <h1>Progress</h1>

  <h2>Per question</h2>
  <p id="perQuestionEmpty" class="empty-state" style="display:none;">
    No questions answered yet. <a href="facts.html">Start a quiz!</a>
  </p>
  <div style="height:300px;">
    <canvas id="perQuestionChart"></canvas>
  </div>

  <h2>Over time</h2>
  <p id="overTimeEmpty" class="empty-state" style="display:none;">
    No sessions have been registered yet. <a href="facts.html">Start a quiz!</a>
  </p>
  <div style="height:250px;">
    <canvas id="overTimeChart"></canvas>
  </div>
</main>

<script src="../js/utils.js"></script>
<script src="../js/progress.js"></script>
</body>
</html>
